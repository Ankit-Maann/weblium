<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weblium Clone</title>
    <link rel="stylesheet" href="style.css">

    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>


<header class="navbar">
    <div class="logo">Weblium</div>

    <nav>
        <a href="#">Solutions</a>
        <a href="#">Pricing</a>
        <a href="#">Templates</a>
        <a href="#">Resources</a>
    </nav>

    <div class="nav-right">
        <span>EN ▾</span>
        <button class="login">Log in</button>
        <button class="start">Start for free</button>
    </div>
</header>


<section class="hero">
    <div class="container">

        
        <div class="left">
            <h1>Your effortless website builder</h1>
            <p>+14 days of free enhanced access.</p>

            <div class="tags">
                <span>Simple</span>
                <span>Functional</span>
                <span>Intuitive</span>
            </div>

            <button class="cta">Create a website for free</button>
        </div>

        
        <div class="right">
            <div class="card">

                <div class="top-img">
                    <img src="https://placehold.net/10-800x600.png" alt="">
                    <p>Make something different</p>
                </div>

                <div class="bottom">
                    <div class="text-area">
                        <div class="line big"></div>
                        <div class="line"></div>

                        <div class="dots">
                            <span></span><span></span><span></span><span></span>
                        </div>

                        <div class="btn"></div>
                    </div>

                    <div class="side-img">
                        <img src="https://placehold.net/3-600x800.png" alt="">
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- chat bubble -->
    <div class="chat"></div>

</section>

</body>
</html>
